version: '3.9'

# Упрощённая версия для локальной разработки (SQLite)
services:
  django:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.dev
    ports:
      - "8000:8000"
    volumes:
      - ./ORANGE:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    restart: unless-stopped

volumes:
  static_volume:
  media_volume:
