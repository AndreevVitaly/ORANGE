events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    upstream django {
        server django:8000;
    }

    # HTTP — редирект на HTTPS
    server {
        listen 80;
        server_name 47appelsin.ru www.47appelsin.ru;

        # Путь для валидации Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Всё остальное — редирект на HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS
    server {
        listen 443 ssl;
        server_name 47appelsin.ru www.47appelsin.ru;
        client_max_body_size 10M;

        # SSL-сертификаты (будут подключены после получения)
        ssl_certificate     /etc/letsencrypt/live/47appelsin.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/47appelsin.ru/privkey.pem;

        # SSL-настройки
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Статика
        location /static/ {
            alias /app/staticfiles/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # Медиа-файлы
        location /media/ {
            alias /app/media/;
            expires 7d;
        }

        # Django-приложение
        location / {
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_redirect off;
        }
    }
}
